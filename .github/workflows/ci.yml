name: CI

on:
  workflow_call:
    inputs:
      upload-artifacts:
        description: "Upload the built plugin .zip as a workflow artifact (consumed by the release workflow)."
        type: boolean
        default: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          validate-wrappers: true # supply-chain guard for gradle-wrapper.jar

      # `buildPlugin` produces build/distributions/awsum-intellij-A.B.C.zip.
      # `verifyPlugin` runs IntelliJ Plugin Verifier against the target IDE.
      - name: Build
        run: ./gradlew buildPlugin verifyPlugin

      - name: Read version
        if: inputs.upload-artifacts
        id: version
        run: |
          set -euo pipefail
          version=$(grep -m1 '^pluginVersion *= *' gradle.properties | sed 's/.*= *//' | tr -d ' ')
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Upload plugin .zip artifact
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v7
        with:
          name: awsum-intellij-${{ steps.version.outputs.value }}-zip
          path: build/distributions/awsum-intellij-${{ steps.version.outputs.value }}.zip
          if-no-files-found: error
          retention-days: 7
