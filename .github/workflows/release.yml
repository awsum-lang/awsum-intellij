name: Release

# Tag is the source of truth: pushing `v*` is what creates an immutable release
# tied to a specific commit. There is intentionally no `workflow_dispatch` here —
# if a release run fails, delete the tag, fix, retag.
on:
  push:
    tags:
      - "v*"

# Don't cancel a release mid-flight if a second tag arrives somehow.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # `intellij-platform-gradle-plugin` reads the version from `gradle.properties`
  # and bakes it into the plugin .zip filename, so a tag/properties mismatch
  # would silently produce an asset whose name disagrees with the release tag.
  # Fail fast before the build.
  verify-version:
    name: Verify tag matches gradle.properties
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Check version
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version=$(grep -m1 '^pluginVersion *= *' gradle.properties | sed 's/.*= *//' | tr -d ' ')
          if [[ "$tag_version" != "$pkg_version" ]]; then
            echo "Tag $GITHUB_REF_NAME implies version $tag_version, but gradle.properties has $pkg_version" >&2
            exit 1
          fi

  ci:
    needs: verify-version
    uses: ./.github/workflows/ci.yml
    with:
      upload-artifacts: true

  release:
    name: Publish GitHub Release
    needs: ci
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      # Required for `gh release create` to upload assets.
      contents: write
      # Required for `actions/attest-build-provenance` — it mints an OIDC token
      # to identify the workflow to Sigstore, and writes the attestation entry.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7

      - name: Download plugin .zip artifact
        uses: actions/download-artifact@v8
        with:
          pattern: awsum-intellij-*-zip
          path: dist
          merge-multiple: true

      # Users verify with:
      #   gh attestation verify awsum-intellij-X.Y.Z.zip --repo awsum-lang/awsum-intellij
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*.zip

      # The JetBrains Marketplace listing itself is updated via the Marketplace
      # web UI or `./gradlew publishPlugin` with a `JETBRAINS_MARKETPLACE_TOKEN`
      # secret — done manually for now. This GitHub Release is for archival +
      # provenance only.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "See [CHANGELOG.md](./CHANGELOG.md)" \
            dist/*.zip
